<header class="topbar">

    <span class="topbar__brand">KoKoon</span>
  } @else {
    <app-context-switcher />
  }
  <a class="topbar__action" routerLink="/messages" aria-label="Messages">
    <mat-icon>chat_bubble_outline</mat-icon>
  </a>
  <a class="topbar__action" routerLink="/settings" aria-label="Settings">
    <mat-icon>settings</mat-icon>
  </a>
</header>
