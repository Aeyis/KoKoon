@if (auth.isConnected()) {
  <app-top-bar />
}

<main
  class="app-shell"
  [class.app-shell--connected]="auth.isConnected()"
  [class.app-shell--sidenav]="auth.isConnected() && !auth.isParent()"
>
  <router-outlet />
</main>

@if (auth.isConnected() && !auth.isParent() && !hideNav()) {
  <app-bottom-nav />
}

@if (auth.isConnected() && auth.isParent() && !hideNav()) {
  <app-parent-nav />
}
