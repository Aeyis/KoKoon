<div class="overlay" (click)="cancelled.emit()">
  <div class="sheet" (click)="$event.stopPropagation()">
    <header class="sheet__head">
      <h2 class="sheet__title">New class</h2>
      <button type="button" class="sheet__close" (click)="cancelled.emit()">✕</button>
    </header>

    <label class="field">
      <span class="field__label">Class name</span>
      <input class="field__input" type="text" [ngModel]="name()" (ngModelChange)="name.set($event)" placeholder="e.g. P3 A" />
    </label>

    <label class="field">
      <span class="field__label">School year</span>
      <input class="field__input" type="text" [ngModel]="schoolYear()" (ngModelChange)="schoolYear.set($event)" placeholder="2025-2026" />
    </label>

    @if (error()) {
      <p class="err">{{ error() }}</p>
    }

    <button class="submit" type="button" [disabled]="saving()" (click)="submit()">
      {{ saving() ? 'Creating…' : 'Create class' }}
    </button>
  </div>
</div>
