services:
  database:
    image: postgres:16-alpine
    container_name: kokoon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - kokoon-data:/var/lib/postgresql/data
volumes:
  kokoon-data:
